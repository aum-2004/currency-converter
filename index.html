<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Currency Converter — Aryan Modi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0f172a;
    --card:        #1e293b;
    --input-bg:    #334155;
    --input-focus: #475569;
    --accent:      #6366f1;
    --accent-h:    #4f46e5;
    --text:        #f8fafc;
    --muted:       #94a3b8;
    --success:     #22c55e;
    --error:       #f87171;
    --border:      rgba(255,255,255,0.08);
    --mono: 'Space Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
    top: -100px; right: -100px;
    pointer-events: none; z-index: 0;
  }

  .back-link {
    position: fixed; top: 1.25rem; left: 1.25rem;
    font-family: var(--mono); font-size: 0.7rem; letter-spacing: 2px;
    color: var(--muted); text-decoration: none;
    border: 1px solid var(--border); padding: 0.5rem 0.9rem;
    border-radius: 4px; transition: all 0.2s; z-index: 10;
    display: flex; align-items: center; gap: 0.4rem;
  }
  .back-link:hover { color: var(--accent); border-color: var(--accent); }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2.5rem 2rem;
    width: 100%; max-width: 460px;
    position: relative; z-index: 1;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px var(--border);
  }

  .card-header { text-align: center; margin-bottom: 2rem; }
  .card-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
  .card-title {
    font-size: 1.5rem; font-weight: 700; margin-bottom: 0.3rem;
    background: linear-gradient(135deg, var(--text), var(--muted));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .card-subtitle { color: var(--muted); font-size: 0.85rem; }

  .form-group { margin-bottom: 1.25rem; }
  label {
    display: block;
    font-size: 0.72rem; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 0.5rem; font-family: var(--mono);
  }

  input[type="number"] {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 1rem;
    padding: 0.8rem 1rem;
    outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }
  input[type="number"]:focus {
    border-color: var(--accent);
    background: var(--input-focus);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
  }
  input[type="number"]::placeholder { color: var(--muted); }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  /* ── Searchable Dropdown ── */
  .currency-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0.75rem;
    align-items: end;
    margin-bottom: 1.25rem;
  }

  .sel-wrap { position: relative; }

  .sel-display {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 1rem;
    padding: 0.8rem 2.2rem 0.8rem 1rem;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    user-select: none;
  }
  .sel-display:focus, .sel-display.open {
    border-color: var(--accent);
    background: var(--input-focus);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
  }
  .sel-arrow {
    position: absolute; right: 0.9rem; top: 50%;
    transform: translateY(-50%);
    color: var(--muted); pointer-events: none; font-size: 0.8rem;
    transition: transform 0.2s;
  }
  .sel-display.open + .sel-arrow { transform: translateY(-50%) rotate(180deg); }

  .sel-dropdown {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: #1e293b;
    border: 1px solid rgba(99,102,241,0.3);
    border-radius: 8px;
    z-index: 100;
    box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  .sel-dropdown.open { display: flex; }

  .sel-search {
    padding: 0.55rem 0.85rem;
    background: #0f172a;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.75rem;
    outline: none;
    letter-spacing: 0.5px;
  }
  .sel-search::placeholder { color: var(--muted); }

  .sel-list {
    max-height: 200px;
    overflow-y: auto;
  }
  .sel-list::-webkit-scrollbar { width: 4px; }
  .sel-list::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.4); border-radius: 2px; }

  .sel-option {
    padding: 0.55rem 0.85rem;
    font-size: 0.82rem;
    cursor: pointer;
    transition: background 0.1s;
    display: flex; align-items: center; gap: 0.5rem;
    color: var(--text);
  }
  .sel-option:hover, .sel-option.highlighted { background: rgba(99,102,241,0.15); color: var(--accent); }
  .sel-option .opt-code {
    font-family: var(--mono); font-size: 0.72rem; font-weight: 700;
    color: var(--accent); min-width: 2.8rem;
  }
  .sel-option .opt-name { color: var(--muted); font-size: 0.78rem; }
  .sel-option .opt-match { background: rgba(99,102,241,0.25); border-radius: 2px; }
  .sel-no-results {
    padding: 0.75rem; text-align: center;
    font-family: var(--mono); font-size: 0.7rem; color: var(--muted);
  }

  /* Swap */
  .swap-btn {
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--muted); font-size: 1.1rem;
    width: 40px; height: 42px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; flex-shrink: 0;
  }
  .swap-btn:hover { border-color: var(--accent); color: var(--accent); transform: rotate(180deg); }

  /* Convert button */
  .convert-btn {
    width: 100%; background: var(--accent); color: #fff;
    font-family: var(--mono); font-size: 0.82rem; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    border: none; border-radius: 8px; padding: 0.9rem;
    cursor: pointer; transition: all 0.25s; margin-top: 0.5rem;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    position: relative; overflow: hidden;
  }
  .convert-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    opacity: 0; transition: opacity 0.2s;
  }
  .convert-btn:hover { background: var(--accent-h); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.4); }
  .convert-btn:hover::before { opacity: 1; }
  .convert-btn:active { transform: translateY(0); }
  .convert-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.7s linear infinite; display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Result */
  .result-box {
    margin-top: 1.25rem;
    background: rgba(34,197,94,0.08);
    border: 1px solid rgba(34,197,94,0.25);
    border-radius: 10px; padding: 1.25rem 1.5rem;
    display: none; animation: fadeSlide 0.35s ease;
  }
  .result-box.error-box { background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.25); }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .result-amount { font-size: 1.8rem; font-weight: 700; color: var(--success); margin-bottom: 0.35rem; }
  .result-box.error-box .result-amount { color: var(--error); font-size: 1rem; }
  .result-rate { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); }
  .result-source { font-family: var(--mono); font-size: 0.58rem; color: var(--muted); margin-top: 0.3rem; opacity: 0.6; }

  /* Quick pairs */
  .quick-title {
    font-family: var(--mono); font-size: 0.62rem; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase;
    margin: 1.5rem 0 0.6rem; text-align: center;
  }
  .quick-pairs { display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: center; }
  .quick-pair {
    font-family: var(--mono); font-size: 0.65rem;
    background: var(--input-bg); border: 1px solid var(--border);
    color: var(--muted); padding: 0.3rem 0.7rem; border-radius: 4px;
    cursor: pointer; transition: all 0.15s;
  }
  .quick-pair:hover { border-color: var(--accent); color: var(--accent); }

  .footer {
    margin-top: 2rem; text-align: center; position: relative; z-index: 1;
    font-family: var(--mono); font-size: 0.62rem; color: var(--muted); letter-spacing: 1px;
  }
  .footer a { color: var(--accent); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  @media (max-width: 480px) {
    .card { padding: 2rem 1.5rem 1.75rem; }
    .card-title { font-size: 1.25rem; }
    .result-amount { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<a href="https://aum-2004.github.io/aum.github.io/" class="back-link">← Portfolio</a>

<div class="card">
  <div class="card-header">
    <div class="card-icon">💱</div>
    <div class="card-title">Currency Converter</div>
    <div class="card-subtitle">Live exchange rates · Type to search currencies</div>
  </div>

  <div class="form-group">
    <label for="amount">Amount</label>
    <input type="number" id="amount" placeholder="Enter amount..." value="1" min="0" step="any"/>
  </div>

  <div class="currency-row">
    <div class="form-group" style="margin-bottom:0">
      <label>From</label>
      <div class="sel-wrap" id="from-wrap">
        <div class="sel-display" id="from-display" tabindex="0">USD</div>
        <span class="sel-arrow">▾</span>
        <div class="sel-dropdown" id="from-dropdown">
          <input class="sel-search" id="from-search" placeholder="Type code or name..." autocomplete="off"/>
          <div class="sel-list" id="from-list"></div>
        </div>
      </div>
    </div>

    <button class="swap-btn" id="swap-btn" title="Swap currencies">⇄</button>

    <div class="form-group" style="margin-bottom:0">
      <label>To</label>
      <div class="sel-wrap" id="to-wrap">
        <div class="sel-display" id="to-display" tabindex="0">EUR</div>
        <span class="sel-arrow">▾</span>
        <div class="sel-dropdown" id="to-dropdown">
          <input class="sel-search" id="to-search" placeholder="Type code or name..." autocomplete="off"/>
          <div class="sel-list" id="to-list"></div>
        </div>
      </div>
    </div>
  </div>

  <button class="convert-btn" id="convert-btn">
    <div class="spinner" id="spinner"></div>
    <span id="btn-text">Convert</span>
  </button>

  <div class="result-box" id="result-box">
    <div class="result-amount" id="result-amount"></div>
    <div class="result-rate" id="result-rate"></div>
    <div class="result-source">Source: Frankfurter · European Central Bank</div>
  </div>

  <div class="quick-title">Quick Convert</div>
  <div class="quick-pairs" id="quick-pairs">
    <span class="quick-pair" data-from="USD" data-to="EUR">USD → EUR</span>
    <span class="quick-pair" data-from="USD" data-to="GBP">USD → GBP</span>
    <span class="quick-pair" data-from="USD" data-to="INR">USD → INR</span>
    <span class="quick-pair" data-from="EUR" data-to="USD">EUR → USD</span>
    <span class="quick-pair" data-from="GBP" data-to="USD">GBP → USD</span>
    <span class="quick-pair" data-from="USD" data-to="JPY">USD → JPY</span>
  </div>
</div>

<div class="footer">
  Built by <a href="https://aum-2004.github.io/aum.github.io/">Aryan Modi</a> ·
  <a href="https://github.com/aum-2004/currency-converter" target="_blank">GitHub Repo</a>
</div>

<script>
const API = 'https://api.frankfurter.app';

// ── State ──────────────────────────────────────────────────
let currencies = []; // [{ code, name }]
let fromValue  = 'USD';
let toValue    = 'EUR';

// ── DOM refs ───────────────────────────────────────────────
const amtIn      = document.getElementById('amount');
const convBtn    = document.getElementById('convert-btn');
const spinner    = document.getElementById('spinner');
const btnText    = document.getElementById('btn-text');
const resultBox  = document.getElementById('result-box');
const resultAmt  = document.getElementById('result-amount');
const resultRate = document.getElementById('result-rate');

// ── Searchable Dropdown ────────────────────────────────────
function buildDropdown(id) {
  const wrap     = document.getElementById(`${id}-wrap`);
  const display  = document.getElementById(`${id}-display`);
  const dropdown = document.getElementById(`${id}-dropdown`);
  const search   = document.getElementById(`${id}-search`);
  const list     = document.getElementById(`${id}-list`);
  let highlighted = -1;

  function normalize(s) {
    return s.toLowerCase().replace(/[^a-z0-9]/g, '');
  }

  function renderList(query = '') {
    const q = normalize(query);
    highlighted = -1;
    list.innerHTML = '';

    const filtered = q
      ? currencies.filter(c =>
          normalize(c.code).startsWith(q) ||
          normalize(c.name).includes(q) ||
          normalize(`${c.code}${c.name}`).includes(q)
        )
      : currencies;

    if (!filtered.length) {
      list.innerHTML = '<div class="sel-no-results">No currencies found</div>';
      return;
    }

    filtered.forEach((c, i) => {
      const el = document.createElement('div');
      el.className = 'sel-option';
      el.dataset.code = c.code;
      el.innerHTML = `<span class="opt-code">${c.code}</span><span class="opt-name">${c.name}</span>`;
      el.addEventListener('mousedown', e => {
        e.preventDefault();
        select(c.code, c.name);
        close();
      });
      list.appendChild(el);
    });
  }

  function open() {
    dropdown.classList.add('open');
    display.classList.add('open');
    search.value = '';
    renderList('');
    // scroll current into view
    const cur = [...list.children].find(el => el.dataset.code === (id === 'from' ? fromValue : toValue));
    if (cur) cur.scrollIntoView({ block: 'center' });
    setTimeout(() => search.focus(), 10);
  }

  function close() {
    dropdown.classList.remove('open');
    display.classList.remove('open');
    highlighted = -1;
  }

  function select(code, name) {
    if (id === 'from') fromValue = code;
    else toValue = code;
    display.textContent = `${code} — ${name}`;
  }

  function moveHighlight(dir) {
    const opts = [...list.querySelectorAll('.sel-option')];
    if (!opts.length) return;
    opts[highlighted]?.classList.remove('highlighted');
    highlighted = Math.max(0, Math.min(opts.length - 1, highlighted + dir));
    opts[highlighted]?.classList.add('highlighted');
    opts[highlighted]?.scrollIntoView({ block: 'nearest' });
  }

  // Events
  display.addEventListener('click', () => dropdown.classList.contains('open') ? close() : open());
  display.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); }
  });

  search.addEventListener('input', () => renderList(search.value));
  search.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown') { e.preventDefault(); moveHighlight(1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); moveHighlight(-1); }
    else if (e.key === 'Enter') {
      const opts = [...list.querySelectorAll('.sel-option')];
      if (highlighted >= 0 && opts[highlighted]) {
        const code = opts[highlighted].dataset.code;
        const cur  = currencies.find(c => c.code === code);
        if (cur) { select(cur.code, cur.name); close(); }
      } else if (opts.length === 1) {
        const code = opts[0].dataset.code;
        const cur  = currencies.find(c => c.code === code);
        if (cur) { select(cur.code, cur.name); close(); }
      }
    }
    else if (e.key === 'Escape') close();
  });

  // Close on outside click
  document.addEventListener('mousedown', e => {
    if (!wrap.contains(e.target)) close();
  });

  return { select, open, close };
}

// ── Init dropdowns ─────────────────────────────────────────
const fromDrop = buildDropdown('from');
const toDrop   = buildDropdown('to');

// ── Load currencies ────────────────────────────────────────
async function loadCurrencies() {
  try {
    const res  = await fetch(`${API}/currencies`);
    const data = await res.json();
    currencies = Object.entries(data).map(([code, name]) => ({ code, name }));

    // Set default display text
    const usd = currencies.find(c => c.code === 'USD');
    const eur = currencies.find(c => c.code === 'EUR');
    if (usd) fromDrop.select('USD', usd.name);
    if (eur) toDrop.select('EUR', eur.name);
  } catch(e) {
    console.error('Failed to load currencies', e);
  }
}

// ── Convert ────────────────────────────────────────────────
async function convert() {
  const amount = parseFloat(amtIn.value);
  if (!amount || amount <= 0) { showError('Please enter a valid amount.'); return; }
  if (fromValue === toValue) { showResult(amount, fromValue, toValue, 1, amount); return; }

  setLoading(true);
  resultBox.style.display = 'none';
  try {
    const res  = await fetch(`${API}/latest?amount=${amount}&from=${fromValue}&to=${toValue}`);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    const converted = data.rates[toValue];
    showResult(converted, fromValue, toValue, converted / amount, amount);
  } catch(e) {
    showError('Failed to fetch rates. Please try again.');
  } finally {
    setLoading(false);
  }
}

function showResult(converted, from, to, rate, amount) {
  resultBox.className = 'result-box';
  resultBox.style.display = 'block';
  resultAmt.textContent  = `${fmt(converted)} ${to}`;
  resultRate.textContent = `1 ${from} = ${fmt(rate)} ${to}  ·  ${new Date().toLocaleTimeString()}`;
}
function showError(msg) {
  resultBox.className = 'result-box error-box';
  resultBox.style.display = 'block';
  resultAmt.textContent  = msg;
  resultRate.textContent = '';
}
function setLoading(on) {
  convBtn.disabled = on;
  spinner.style.display = on ? 'block' : 'none';
  btnText.textContent = on ? 'Converting...' : 'Convert';
}
function fmt(n) {
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
}

// ── Swap ───────────────────────────────────────────────────
document.getElementById('swap-btn').addEventListener('click', () => {
  const tmpCode = fromValue;
  const tmpName = currencies.find(c => c.code === toValue)?.name || toValue;
  const fromName = currencies.find(c => c.code === fromValue)?.name || fromValue;
  fromDrop.select(toValue, tmpName);
  toDrop.select(tmpCode, fromName);
  if (resultBox.style.display === 'block') convert();
});

// ── Quick pairs ────────────────────────────────────────────
document.getElementById('quick-pairs').addEventListener('click', e => {
  const pair = e.target.closest('.quick-pair');
  if (!pair) return;
  const f = currencies.find(c => c.code === pair.dataset.from);
  const t = currencies.find(c => c.code === pair.dataset.to);
  if (f) fromDrop.select(f.code, f.name);
  if (t) toDrop.select(t.code, t.name);
  amtIn.value = 1;
  convert();
});

// ── Enter key ──────────────────────────────────────────────
amtIn.addEventListener('keydown', e => { if (e.key === 'Enter') convert(); });
convBtn.addEventListener('click', convert);

// ── Bootstrap ──────────────────────────────────────────────
loadCurrencies().then(() => convert());
</script>
</body>
</html>
