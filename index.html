<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Currency Converter — Aryan Modi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0f172a;
    --card:       #1e293b;
    --input-bg:   #2d3f55;
    --input-fo:   #374f68;
    --accent:     #6366f1;
    --accent-h:   #4f46e5;
    --accent-lo:  rgba(99,102,241,0.12);
    --text:       #f1f5f9;
    --sub:        #cbd5e1;
    --muted:      #64748b;
    --border:     rgba(148,163,184,0.1);
    --border-hi:  rgba(99,102,241,0.5);
    --success:    #4ade80;
    --success-bg: rgba(74,222,128,0.07);
    --success-br: rgba(74,222,128,0.25);
    --error:      #f87171;
    --error-bg:   rgba(248,113,113,0.07);
    --error-br:   rgba(248,113,113,0.25);
    --r-sm:       8px;
    --r-md:       12px;
    --r-lg:       18px;
    --sans:       'Inter', system-ui, sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow-x: hidden;
  }

  /* subtle dot grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(rgba(99,102,241,0.15) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none; z-index: 0;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, #000 40%, transparent 100%);
  }
  /* top-right glow */
  body::after {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 65%);
    top: -100px; right: -80px;
    pointer-events: none; z-index: 0;
  }

  /* ── Card ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 2.25rem 2rem 1.75rem;
    width: 100%; max-width: 440px;
    position: relative; z-index: 1;
    box-shadow:
      0 4px 6px rgba(0,0,0,0.2),
      0 20px 60px rgba(0,0,0,0.45),
      inset 0 1px 0 rgba(255,255,255,0.05);
  }

  /* ── Header ── */
  .card-header { text-align: center; margin-bottom: 2rem; }

  .card-icon {
    width: 52px; height: 52px;
    margin: 0 auto 1rem;
    background: var(--accent-lo);
    border: 1px solid var(--border-hi);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .card-icon svg { width: 26px; height: 26px; color: #a5b4fc; }

  .card-title {
    font-size: 1.55rem; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--text) 20%, #a5b4fc 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 0.3rem;
  }
  .card-subtitle { color: var(--muted); font-size: 0.83rem; font-weight: 400; }

  /* ── Field label ── */
  .field-label {
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.8px;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 0.45rem; display: block;
  }

  /* ── Amount input ── */
  .form-group { margin-bottom: 1.1rem; }

  input[type="number"] {
    width: 100%;
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: var(--r-sm);
    color: var(--text);
    font-family: var(--sans);
    font-size: 1.05rem; font-weight: 500;
    padding: 0.8rem 1rem;
    outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }
  input[type="number"]:focus {
    border-color: var(--accent);
    background: var(--input-fo);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
  }
  input[type="number"]::placeholder { color: var(--muted); }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  /* ── Currency row ── */
  .currency-row {
    display: grid;
    grid-template-columns: 1fr 40px 1fr;
    gap: 0.6rem;
    align-items: end;
    margin-bottom: 1.1rem;
  }
  .currency-col { min-width: 0; }

  /* ── Custom Dropdown ── */
  .sel-wrap { position: relative; }

  .sel-trigger {
    width: 100%;
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: var(--r-sm);
    padding: 0.55rem 2.2rem 0.55rem 0.85rem;
    cursor: pointer; outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    user-select: none;
    display: flex; flex-direction: column; gap: 1px;
    position: relative;
  }
  .sel-trigger:hover   { border-color: rgba(99,102,241,0.4); }
  .sel-trigger.open    {
    border-color: var(--accent);
    background: var(--input-fo);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
  }

  .sel-code {
    font-size: 0.92rem; font-weight: 700; color: var(--text);
    letter-spacing: 0.3px; line-height: 1.2;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sel-name {
    font-size: 0.68rem; font-weight: 400; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1.2;
  }

  .sel-caret {
    position: absolute; right: 0.75rem; top: 50%;
    transform: translateY(-50%);
    color: var(--muted); pointer-events: none;
    transition: transform 0.2s;
    display: flex; align-items: center;
  }
  .sel-caret svg { width: 14px; height: 14px; }
  .sel-trigger.open .sel-caret { transform: translateY(-50%) rotate(180deg); }

  /* dropdown panel */
  .sel-panel {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: #1a2744;
    border: 1px solid rgba(99,102,241,0.3);
    border-radius: var(--r-md);
    z-index: 300;
    box-shadow: 0 24px 60px rgba(0,0,0,0.7);
    display: none; flex-direction: column; overflow: hidden;
  }
  .sel-panel.open { display: flex; }

  .sel-search-wrap {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.6rem 0.85rem;
    background: #0f172a;
    border-bottom: 1px solid var(--border);
  }
  .sel-search-wrap svg { width: 14px; height: 14px; color: var(--muted); flex-shrink: 0; }
  .sel-search-input {
    background: none; border: none; outline: none;
    color: var(--text); font-family: var(--sans);
    font-size: 0.82rem; width: 100%;
  }
  .sel-search-input::placeholder { color: var(--muted); }

  .sel-list { max-height: 200px; overflow-y: auto; }
  .sel-list::-webkit-scrollbar { width: 4px; }
  .sel-list::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.4); border-radius: 2px; }

  .sel-option {
    display: flex; align-items: center; gap: 0.65rem;
    padding: 0.5rem 0.85rem; cursor: pointer;
    transition: background 0.1s; border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .sel-option:last-child { border-bottom: none; }
  .sel-option:hover, .sel-option.highlighted { background: rgba(99,102,241,0.15); }
  .sel-option.selected { background: rgba(99,102,241,0.1); }
  .sel-option .oc { font-size: 0.78rem; font-weight: 700; color: #a5b4fc; min-width: 2.6rem; }
  .sel-option .on { font-size: 0.73rem; color: var(--sub); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sel-no-match {
    padding: 1rem; text-align: center;
    font-size: 0.75rem; color: var(--muted);
  }

  /* ── Swap button ── */
  .swap-btn {
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    color: var(--muted);
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.25s; flex-shrink: 0; align-self: flex-end;
    margin-bottom: 0;
  }
  .swap-btn svg { width: 16px; height: 16px; transition: transform 0.35s; }
  .swap-btn:hover {
    border-color: var(--accent); color: #a5b4fc;
    background: var(--accent-lo);
    box-shadow: 0 0 14px rgba(99,102,241,0.25);
  }
  .swap-btn:hover svg { transform: rotate(180deg); }

  /* ── Convert button ── */
  .convert-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #818cf8);
    color: #fff;
    font-family: var(--sans); font-size: 0.9rem; font-weight: 700;
    letter-spacing: 0.3px;
    border: none; border-radius: var(--r-sm);
    padding: 0.9rem;
    cursor: pointer; transition: all 0.25s;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    box-shadow: 0 4px 20px rgba(99,102,241,0.3);
    position: relative; overflow: hidden;
  }
  .convert-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    opacity: 0; transition: opacity 0.2s;
  }
  .convert-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(99,102,241,0.45); }
  .convert-btn:hover::before { opacity: 1; }
  .convert-btn:active { transform: translateY(0); box-shadow: 0 4px 16px rgba(99,102,241,0.25); }
  .convert-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.65s linear infinite; display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Divider ── */
  .divider {
    height: 1px; background: var(--border);
    margin: 1.25rem 0;
  }

  /* ── Result ── */
  .result-box {
    background: var(--success-bg);
    border: 1px solid var(--success-br);
    border-radius: var(--r-md); padding: 1.1rem 1.25rem;
    display: none; animation: fadeUp 0.3s ease;
  }
  .result-box.error-box {
    background: var(--error-bg);
    border-color: var(--error-br);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-top {
    display: flex; align-items: baseline; gap: 0.5rem;
    margin-bottom: 0.5rem;
  }
  .result-amount {
    font-size: 2rem; font-weight: 800; letter-spacing: -1px;
    color: var(--success); line-height: 1;
  }
  .result-currency {
    font-size: 1rem; font-weight: 600; color: var(--success); opacity: 0.7;
  }
  .result-box.error-box .result-amount {
    font-size: 0.9rem; font-weight: 500; color: var(--error); letter-spacing: 0;
  }
  .result-box.error-box .result-currency { display: none; }

  .result-rate {
    font-size: 0.72rem; color: var(--muted); margin-bottom: 0.2rem;
  }
  .result-source { font-size: 0.62rem; color: var(--muted); opacity: 0.6; }

  /* ── Quick pairs ── */
  .quick-label {
    font-size: 0.65rem; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; color: var(--muted);
    text-align: center; margin: 1.25rem 0 0.6rem;
  }
  .quick-pairs { display: flex; flex-wrap: wrap; gap: 0.35rem; justify-content: center; }
  .quick-pair {
    font-size: 0.7rem; font-weight: 500;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    color: var(--sub); padding: 0.3rem 0.7rem; border-radius: 6px;
    cursor: pointer; transition: all 0.15s;
  }
  .quick-pair:hover {
    border-color: var(--border-hi); color: #a5b4fc;
    background: var(--accent-lo);
  }

  /* ── Footer ── */
  .footer {
    margin-top: 1.75rem; text-align: center;
    font-size: 0.72rem; color: var(--muted);
    position: relative; z-index: 1;
  }
  .footer a { color: #a5b4fc; text-decoration: none; font-weight: 500; }
  .footer a:hover { text-decoration: underline; }
  .footer-dot { margin: 0 0.4rem; opacity: 0.4; }

  @media (max-width: 480px) {
    .card { padding: 1.75rem 1.25rem 1.5rem; }
    .card-title { font-size: 1.35rem; }
    .result-amount { font-size: 1.65rem; }
    .currency-row { grid-template-columns: 1fr 36px 1fr; gap: 0.4rem; }
    .swap-btn { width: 36px; height: 36px; }
  }
</style>
</head>
<body>

<div class="card">
  <!-- Header -->
  <div class="card-header">
    <div class="card-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
        <path d="M9 14.5c0 1.1.9 2 2 2h2a2 2 0 0 0 0-4h-2a2 2 0 0 1 0-4h2c1.1 0 2 .9 2 2"/>
        <path d="M12 6v2m0 8v2"/>
      </svg>
    </div>
    <div class="card-title">Currency Converter</div>
    <div class="card-subtitle">Real-time exchange rates at your fingertips</div>
  </div>

  <!-- Amount -->
  <div class="form-group">
    <label class="field-label" for="amount">Amount</label>
    <input type="number" id="amount" placeholder="0.00" value="1" min="0" step="any"/>
  </div>

  <!-- From / Swap / To -->
  <div class="currency-row">
    <!-- FROM -->
    <div class="currency-col">
      <label class="field-label">From</label>
      <div class="sel-wrap" id="from-wrap">
        <div class="sel-trigger" id="from-trigger" tabindex="0" role="combobox" aria-haspopup="listbox">
          <span class="sel-code" id="from-code">USD</span>
          <span class="sel-name" id="from-name">US Dollar</span>
          <span class="sel-caret">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </div>
        <div class="sel-panel" id="from-panel" role="listbox">
          <div class="sel-search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input class="sel-search-input" id="from-search" placeholder="Search currencies..." autocomplete="off" spellcheck="false"/>
          </div>
          <div class="sel-list" id="from-list"></div>
        </div>
      </div>
    </div>

    <!-- Swap -->
    <button class="swap-btn" id="swap-btn" title="Swap currencies" aria-label="Swap currencies">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
        <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
      </svg>
    </button>

    <!-- TO -->
    <div class="currency-col">
      <label class="field-label">To</label>
      <div class="sel-wrap" id="to-wrap">
        <div class="sel-trigger" id="to-trigger" tabindex="0" role="combobox" aria-haspopup="listbox">
          <span class="sel-code" id="to-code">EUR</span>
          <span class="sel-name" id="to-name">Euro</span>
          <span class="sel-caret">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </div>
        <div class="sel-panel" id="to-panel" role="listbox">
          <div class="sel-search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input class="sel-search-input" id="to-search" placeholder="Search currencies..." autocomplete="off" spellcheck="false"/>
          </div>
          <div class="sel-list" id="to-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Convert Button -->
  <button class="convert-btn" id="convert-btn">
    <div class="spinner" id="spinner"></div>
    <span id="btn-text">Convert</span>
  </button>

  <!-- Result -->
  <div class="result-box" id="result-box" style="margin-top:1rem;">
    <div class="result-top">
      <div class="result-amount" id="result-amount"></div>
      <div class="result-currency" id="result-currency"></div>
    </div>
    <div class="result-rate" id="result-rate"></div>
    <div class="result-source" id="result-source"></div>
  </div>

  <!-- Quick pairs -->
  <div class="divider"></div>
  <div class="quick-label">Quick Convert</div>
  <div class="quick-pairs" id="quick-pairs">
    <span class="quick-pair" data-from="USD" data-to="EUR">USD → EUR</span>
    <span class="quick-pair" data-from="USD" data-to="GBP">USD → GBP</span>
    <span class="quick-pair" data-from="USD" data-to="INR">USD → INR</span>
    <span class="quick-pair" data-from="EUR" data-to="USD">EUR → USD</span>
    <span class="quick-pair" data-from="GBP" data-to="USD">GBP → USD</span>
    <span class="quick-pair" data-from="USD" data-to="JPY">USD → JPY</span>
  </div>
</div>

<div class="footer">
  Built by <a href="https://aum-2004.github.io/" target="_blank" rel="noopener">Aryan Modi</a>
  <span class="footer-dot">·</span>
  <a href="https://github.com/aum-2004/currency-converter" target="_blank" rel="noopener">GitHub Repo</a>
</div>

<script>
// ── Config ────────────────────────────────────────────────
const API_KEY  = 'KXLQKSNCBuA4CCEaw84gp1ErTkgLFX05';
const API_BASE = 'https://api.apilayer.com/exchangerates_data';
const FB_BASE  = 'https://api.frankfurter.app';

// ── State ─────────────────────────────────────────────────
let currencies    = []; // [{ code, name }]
let fromValue     = 'USD';
let toValue       = 'EUR';
let usingFallback = false;

// ── DOM ───────────────────────────────────────────────────
const amtIn      = document.getElementById('amount');
const convBtn    = document.getElementById('convert-btn');
const spinner    = document.getElementById('spinner');
const btnText    = document.getElementById('btn-text');
const resultBox  = document.getElementById('result-box');
const resultAmt  = document.getElementById('result-amount');
const resultCur  = document.getElementById('result-currency');
const resultRate = document.getElementById('result-rate');
const resultSrc  = document.getElementById('result-source');

// ── Dropdown builder ──────────────────────────────────────
function buildDropdown(id) {
  const wrap    = document.getElementById(`${id}-wrap`);
  const trigger = document.getElementById(`${id}-trigger`);
  const panel   = document.getElementById(`${id}-panel`);
  const search  = document.getElementById(`${id}-search`);
  const list    = document.getElementById(`${id}-list`);
  const codeEl  = document.getElementById(`${id}-code`);
  const nameEl  = document.getElementById(`${id}-name`);
  let highlighted = -1;

  function norm(s) { return s.toLowerCase().replace(/[^a-z0-9]/g, ''); }

  function renderList(q = '') {
    const nq = norm(q);
    highlighted = -1;
    list.innerHTML = '';
    const filtered = nq
      ? currencies.filter(c =>
          norm(c.code).startsWith(nq) ||
          norm(c.name).includes(nq) ||
          (c.code + ' ' + c.name).toLowerCase().includes(q.toLowerCase())
        )
      : currencies;

    if (!filtered.length) {
      list.innerHTML = '<div class="sel-no-match">No currencies found</div>';
      return;
    }
    const cur = id === 'from' ? fromValue : toValue;
    filtered.forEach(c => {
      const el = document.createElement('div');
      el.className = 'sel-option' + (c.code === cur ? ' selected' : '');
      el.setAttribute('role', 'option');
      el.dataset.code = c.code;
      el.innerHTML = `<span class="oc">${c.code}</span><span class="on">${c.name}</span>`;
      el.addEventListener('mousedown', e => { e.preventDefault(); select(c); close(); });
      list.appendChild(el);
    });
  }

  function openPanel() {
    // Close all other panels first
    document.querySelectorAll('.sel-panel.open').forEach(p => {
      if (p !== panel) {
        p.classList.remove('open');
        p.previousElementSibling?.classList.remove('open');
      }
    });
    panel.classList.add('open');
    trigger.classList.add('open');
    search.value = '';
    renderList('');
    // Scroll to current selection
    const cur = id === 'from' ? fromValue : toValue;
    const sel = list.querySelector(`[data-code="${cur}"]`);
    if (sel) setTimeout(() => sel.scrollIntoView({ block: 'center' }), 10);
    setTimeout(() => search.focus(), 15);
  }

  function close() {
    panel.classList.remove('open');
    trigger.classList.remove('open');
    highlighted = -1;
  }

  function select(c) {
    if (id === 'from') fromValue = c.code;
    else               toValue   = c.code;
    codeEl.textContent = c.code;
    nameEl.textContent = c.name;
  }

  function moveHighlight(dir) {
    const opts = [...list.querySelectorAll('.sel-option')];
    if (!opts.length) return;
    opts[highlighted]?.classList.remove('highlighted');
    highlighted = Math.max(0, Math.min(opts.length - 1, highlighted + dir));
    opts[highlighted]?.classList.add('highlighted');
    opts[highlighted]?.scrollIntoView({ block: 'nearest' });
  }

  trigger.addEventListener('click', () => panel.classList.contains('open') ? close() : openPanel());
  trigger.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openPanel(); }
  });
  search.addEventListener('input', () => renderList(search.value));
  search.addEventListener('keydown', e => {
    if      (e.key === 'ArrowDown')  { e.preventDefault(); moveHighlight(1); }
    else if (e.key === 'ArrowUp')    { e.preventDefault(); moveHighlight(-1); }
    else if (e.key === 'Escape')     close();
    else if (e.key === 'Enter') {
      const opts = [...list.querySelectorAll('.sel-option')];
      const tgt  = highlighted >= 0 ? opts[highlighted] : opts.length === 1 ? opts[0] : null;
      if (tgt) {
        const c = currencies.find(x => x.code === tgt.dataset.code);
        if (c) { select(c); close(); }
      }
    }
  });
  document.addEventListener('mousedown', e => { if (!wrap.contains(e.target)) close(); });

  return { select };
}

const fromDrop = buildDropdown('from');
const toDrop   = buildDropdown('to');

// ── Load currencies ───────────────────────────────────────
async function loadCurrencies() {
  try {
    const res = await fetch(`${API_BASE}/symbols`, { headers: { 'apikey': API_KEY } });
    if (!res.ok) throw new Error('symbols failed');
    const data = await res.json();
    if (!data.success) throw new Error('not successful');
    currencies = Object.entries(data.symbols).map(([code, name]) => ({ code, name }));
    usingFallback = false;
  } catch(e) {
    console.warn('apilayer unavailable, using Frankfurter:', e.message);
    try {
      const res = await fetch(`${FB_BASE}/currencies`);
      const data = await res.json();
      currencies = Object.entries(data).map(([code, name]) => ({ code, name }));
      usingFallback = true;
    } catch(e2) {
      console.error('Both APIs failed to load currencies');
    }
  }

  const usd = currencies.find(c => c.code === 'USD');
  const eur = currencies.find(c => c.code === 'EUR');
  if (usd) fromDrop.select(usd);
  if (eur) toDrop.select(eur);
}

// ── Convert ───────────────────────────────────────────────
async function convert() {
  const amount = parseFloat(amtIn.value);
  if (isNaN(amount) || amount <= 0) { showError('Please enter a valid positive amount.'); return; }
  if (fromValue === toValue) { showResult(amount, fromValue, toValue, 1, amount); return; }

  setLoading(true);
  resultBox.style.display = 'none';

  try {
    let rate;
    if (!usingFallback) {
      const res = await fetch(
        `${API_BASE}/latest?symbols=${toValue}&base=${fromValue}`,
        { headers: { 'apikey': API_KEY } }
      );
      if (!res.ok) throw new Error('rate fetch failed');
      const data = await res.json();
      if (!data.success) throw new Error('not successful');
      rate = data.rates[toValue];
    } else {
      const res  = await fetch(`${FB_BASE}/latest?amount=1&from=${fromValue}&to=${toValue}`);
      const data = await res.json();
      rate = data.rates[toValue];
    }
    showResult(amount * rate, fromValue, toValue, rate, amount);
  } catch(e) {
    if (!usingFallback) { usingFallback = true; return convert(); }
    showError('Unable to fetch exchange rates. Please try again.');
  } finally {
    setLoading(false);
  }
}

function showResult(converted, from, to, rate, amount) {
  resultBox.className = 'result-box';
  resultBox.style.display = 'block';
  resultAmt.textContent  = fmt(converted);
  resultCur.textContent  = to;
  resultRate.textContent = `1 ${from} = ${fmtRate(rate)} ${to}  ·  ${new Date().toLocaleTimeString()}`;
  resultSrc.textContent  = usingFallback
    ? 'Source: Frankfurter · European Central Bank'
    : 'Source: ExchangeRates API · apilayer';
}

function showError(msg) {
  resultBox.className = 'result-box error-box';
  resultBox.style.display = 'block';
  resultAmt.textContent  = msg;
  resultCur.textContent  = '';
  resultRate.textContent = '';
  resultSrc.textContent  = '';
}

function setLoading(on) {
  convBtn.disabled       = on;
  spinner.style.display  = on ? 'block' : 'none';
  btnText.textContent    = on ? 'Converting…' : 'Convert';
}

function fmt(n) {
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
}
function fmtRate(n) {
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: 4, maximumFractionDigits: 6 });
}

// ── Swap ──────────────────────────────────────────────────
document.getElementById('swap-btn').addEventListener('click', () => {
  const pf = fromValue, pt = toValue;
  const cf = currencies.find(c => c.code === pf);
  const ct = currencies.find(c => c.code === pt);
  if (cf) toDrop.select(cf);
  if (ct) fromDrop.select(ct);
  if (resultBox.style.display === 'block') convert();
});

// ── Quick pairs ───────────────────────────────────────────
document.getElementById('quick-pairs').addEventListener('click', e => {
  const p = e.target.closest('.quick-pair');
  if (!p) return;
  const f = currencies.find(c => c.code === p.dataset.from);
  const t = currencies.find(c => c.code === p.dataset.to);
  if (f) fromDrop.select(f);
  if (t) toDrop.select(t);
  amtIn.value = 1;
  convert();
});

// ── Enter key ─────────────────────────────────────────────
amtIn.addEventListener('keydown', e => { if (e.key === 'Enter') convert(); });
convBtn.addEventListener('click', convert);

// ── Init ──────────────────────────────────────────────────
loadCurrencies().then(() => convert());
</script>
